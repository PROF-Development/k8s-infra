apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-shared
  namespace: prof-test-db
  labels:
    app: redis-shared
    app.kubernetes.io/instance: infrastructure-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-shared
  template:
    metadata:
      labels:
        app: redis-shared
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis-shared
  namespace: prof-test-db
  labels:
    app: redis-shared
    app.kubernetes.io/instance: infrastructure-apps
spec:
  selector:
    app: redis-shared
  ports:
    - port: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-schedule-api
  namespace: prof-test-db
  labels:
    app.kubernetes.io/instance: infrastructure-apps
spec:
  type: ExternalName
  externalName: redis-shared.prof-test-db.svc.cluster.local
---
apiVersion: v1
kind: Service
metadata:
  name: redis-prof-assistant
  namespace: prof-test-db
  labels:
    app.kubernetes.io/instance: infrastructure-apps
spec:
  type: ExternalName
  externalName: redis-shared.prof-test-db.svc.cluster.local
